---
# =============================================================================
# Systemd and Cgroup Configuration Playbook
# =============================================================================
# Configures systemd resource control and cgroup v2 for Oracle RAC
# Requirements: 11.1, 11.2, 11.3, 11.4, 11.5, 11.6, 11.7
# =============================================================================

# =============================================================================
# Systemd System Configuration (Requirements 11.1, 11.2, 11.3)
# =============================================================================
- name: Configure systemd system.conf
  lineinfile:
    path: /etc/systemd/system.conf
    regexp: "^#?{{ item.option }}="
    line: "{{ item.option }}={{ item.value }}"
    backup: yes
  loop: "{{ systemd_settings.system_conf }}"
  notify: reload systemd
  tags:
    - systemd
    - system

- name: Configure systemd logind.conf (Requirement 11.4)
  lineinfile:
    path: /etc/systemd/logind.conf
    regexp: "^#?{{ item.option }}="
    line: "{{ item.option }}={{ item.value }}"
    backup: yes
  loop: "{{ systemd_settings.logind_conf }}"
  notify: reload systemd
  tags:
    - systemd
    - logind

# =============================================================================
# OOM Killer Prevention (Requirement 11.5)
# =============================================================================
- name: Create systemd drop-in directory for Oracle services
  file:
    path: /etc/systemd/system/oracle.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: oom_killer_settings.enabled
  tags:
    - systemd
    - oom

- name: Configure OOM killer prevention for Oracle processes
  copy:
    dest: /etc/systemd/system/oracle.service.d/oom.conf
    content: |
      # OOM Killer Prevention for Oracle Processes
      # Generated by Ansible
      [Service]
      OOMScoreAdjust=-1000
      MemoryAccounting=yes
    owner: root
    group: root
    mode: '0644'
  when: oom_killer_settings.enabled
  notify: reload systemd
  tags:
    - systemd
    - oom

# =============================================================================
# Systemd Configuration Reload (Requirement 11.6)
# =============================================================================
- name: Flush handlers to reload systemd immediately
  meta: flush_handlers
  tags:
    - systemd

# =============================================================================
# Cgroup v2 Verification (Requirement 11.7)
# =============================================================================
- name: Check cgroup version
  command: stat -fc %T /sys/fs/cgroup/
  register: cgroup_version
  changed_when: false
  tags:
    - systemd
    - cgroup
    - verify

- name: Display cgroup version
  debug:
    msg: "Cgroup filesystem type: {{ cgroup_version.stdout }} (cgroup2fs = v2, tmpfs = v1)"
  tags:
    - systemd
    - cgroup
    - verify

- name: Verify cgroup v2 is in use
  assert:
    that:
      - cgroup_version.stdout == "cgroup2fs"
    fail_msg: "Cgroup v1 detected. Oracle 19.19+ requires cgroup v2 on Rocky Linux 9"
    success_msg: "Cgroup v2 is correctly configured"
  tags:
    - systemd
    - cgroup
    - verify

- name: Check systemd configuration
  command: systemctl show-environment
  register: systemd_env
  changed_when: false
  tags:
    - systemd
    - verify

- name: Display systemd environment
  debug:
    msg: "{{ systemd_env.stdout_lines }}"
  tags:
    - systemd
    - verify

# =============================================================================
# Handlers
# =============================================================================
handlers:
  - name: reload systemd
    systemd:
      daemon_reload: yes

