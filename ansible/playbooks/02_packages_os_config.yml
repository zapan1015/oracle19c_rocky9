---
# Ansible Playbook: Package Installation and OS Configuration
# This playbook installs Oracle preinstall package, configures kernel parameters,
# and sets resource limits for Oracle 19c RAC
# Runs on node2 (Ansible control node) and applies to both node1 and node2
# Requirements: 5.1-5.4, 10.1-10.10

- name: Configure Packages and OS Settings for Oracle RAC
  hosts: rac_nodes
  become: yes
  gather_facts: yes
  
  tasks:
    # =========================================================================
    # Oracle Preinstall Package Installation (Requirements 5.1, 5.4)
    # Task 6.1: Oracle Preinstall 패키지 설치 태스크 작성
    # =========================================================================
    - name: Install Oracle Database Preinstall 19c package
      dnf:
        name: oracle-database-preinstall-19c
        state: present
        enablerepo: ol9_developer_EPEL
      register: preinstall_result
      ignore_errors: yes
      tags:
        - packages
        - oracle_preinstall

    - name: Install required RPM packages for Oracle RAC
      dnf:
        name: "{{ required_packages }}"
        state: present
      tags:
        - packages
        - oracle_preinstall

    - name: Display package installation results
      debug:
        msg: |
          Package Installation Complete:
          - oracle-database-preinstall-19c: {{ 'Installed' if preinstall_result is succeeded else 'Skipped (may not be available)' }}
          - Additional packages: {{ required_packages | join(', ') }}
      tags:
        - packages
        - oracle_preinstall

    # =========================================================================
    # Kernel Parameters Configuration (Requirements 5.2, 10.1-10.5)
    # Task 6.2: 커널 매개변수 구성 태스크 작성
    # =========================================================================
    - name: Configure kernel parameters via sysctl
      sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        sysctl_file: /etc/sysctl.conf
        reload: yes
      loop: "{{ kernel_parameters }}"
      loop_control:
        label: "{{ item.name }} = {{ item.value }}"
      tags:
        - kernel_params
        - os_config

    - name: Apply sysctl settings immediately
      command: sysctl -p
      changed_when: false
      tags:
        - kernel_params
        - os_config

    - name: Display kernel parameter configuration results
      debug:
        msg: |
          Kernel Parameters Configured:
          {% for param in kernel_parameters %}
          - {{ param.name }}: {{ param.value }} ({{ param.description }})
          {% endfor %}
      tags:
        - kernel_params
        - os_config

    # =========================================================================
    # Resource Limits Configuration (Requirements 5.3, 10.6-10.9)
    # Task 6.3: 리소스 제한 구성 태스크 작성
    # =========================================================================
    - name: Configure resource limits for Oracle users
      pam_limits:
        domain: "{{ item.domain }}"
        limit_type: "{{ item.limit_type }}"
        limit_item: "{{ item.limit_item }}"
        value: "{{ item.value }}"
        dest: /etc/security/limits.conf
      loop: "{{ resource_limits }}"
      loop_control:
        label: "{{ item.domain }} {{ item.limit_type }} {{ item.limit_item }} {{ item.value }}"
      tags:
        - resource_limits
        - os_config

    - name: Ensure limits.d directory exists
      file:
        path: /etc/security/limits.d
        state: directory
        mode: '0755'
      tags:
        - resource_limits
        - os_config

    - name: Create Oracle-specific limits file
      template:
        dest: /etc/security/limits.d/99-oracle-limits.conf
        mode: '0644'
        content: |
          # Oracle Database Resource Limits
          # Generated by Ansible - Do not edit manually
          # Requirements: 10.6-10.9
          
          {% for limit in resource_limits %}
          {{ limit.domain }}  {{ limit.limit_type }}  {{ limit.limit_item }}  {{ limit.value }}
          {% endfor %}
      tags:
        - resource_limits
        - os_config

    - name: Display resource limits configuration results
      debug:
        msg: |
          Resource Limits Configured:
          Grid User:
          - soft nofile: 1024
          - hard nofile: 65536
          - soft nproc: 16384
          - hard nproc: 16384
          Oracle User:
          - soft nofile: 1024
          - hard nofile: 65536
          - soft nproc: 16384
          - hard nproc: 16384
      tags:
        - resource_limits
        - os_config

    # =========================================================================
    # Verification Tasks (Requirements 5.2, 5.3, 10.10)
    # =========================================================================
    - name: Verify kernel parameters are set correctly
      command: sysctl {{ item.name }}
      loop: "{{ kernel_parameters }}"
      loop_control:
        label: "{{ item.name }}"
      register: sysctl_verification
      changed_when: false
      tags:
        - verify
        - os_config

    - name: Verify resource limits are configured
      shell: |
        grep -E "^{{ item.domain }}\s+{{ item.limit_type }}\s+{{ item.limit_item }}" /etc/security/limits.conf || \
        grep -E "^{{ item.domain }}\s+{{ item.limit_type }}\s+{{ item.limit_item }}" /etc/security/limits.d/99-oracle-limits.conf
      loop: "{{ resource_limits }}"
      loop_control:
        label: "{{ item.domain }} {{ item.limit_type }} {{ item.limit_item }}"
      register: limits_verification
      changed_when: false
      failed_when: false
      tags:
        - verify
        - os_config

    - name: Display verification summary
      debug:
        msg: |
          ========================================
          Package and OS Configuration Complete
          ========================================
          
          ✓ Oracle preinstall package installed
          ✓ Required RPM packages installed
          ✓ Kernel parameters configured and persistent
          ✓ Resource limits configured for grid and oracle users
          ✓ Configuration will persist across reboots
          
          Next Steps:
          - Verify configuration with property-based tests
          - Proceed to security configuration (Task 8)
      tags:
        - verify
        - os_config

