# Ansible Inventory for Oracle RAC 2-Node Cluster
# This inventory defines the RAC nodes and connection parameters
# Ansible runs on node2 (control node) to configure both node1 and node2

[rac_nodes]
node1 ansible_host=192.168.1.101
node2 ansible_host=192.168.1.102

[rac_nodes:vars]
# Connection settings
ansible_user=root
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# Network configuration
public_network_subnet=192.168.1.0/24
private_network_subnet=10.0.0.0/24

# Node-specific variables can be defined in host_vars/ if needed
