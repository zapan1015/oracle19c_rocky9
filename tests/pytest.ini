[pytest]
# pytest configuration for Oracle RAC Vagrant Setup tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    property: Property-based tests (minimum 100 iterations)
    unit: Unit tests for specific examples
    integration: Integration tests requiring running VMs
    slow: Tests that take a long time to run

# Hypothesis settings
hypothesis_profile = default

# Test paths
testpaths = .

# Minimum Python version
minversion = 3.8
